<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Playlist</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --accent: #c8f542;
      --accent2: #7b5cf5;
      --text: #e8e8f0;
      --muted: #5a5a72;
      --border: #2a2a3a;
      --danger: #f54242;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 380px;
      grid-template-rows: auto 1fr;
      gap: 0;
    }

    /* HEADER */
    header {
      grid-column: 1 / -1;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    header h1 span { color: var(--accent); }
    .track-counter {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* PLAYER SIDE */
    .player-section {
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      border-right: 1px solid var(--border);
    }

    /* Add URL form */
    .add-form {
      display: flex;
      gap: 10px;
    }
    .add-form input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-form input:focus { border-color: var(--accent); }
    .add-form input::placeholder { color: var(--muted); }
    .add-form button {
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .add-form button:hover { opacity: 0.85; }
    .add-form button:active { transform: scale(0.97); }

    /* NOW PLAYING label */
    .now-playing-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
    }
    .now-playing-title {
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.3;
      min-height: 1.4em;
      color: var(--text);
    }

    /* YouTube embed wrapper */
    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--surface2);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
    }
    .video-placeholder svg { opacity: 0.3; }
    .video-placeholder p { font-size: 0.85rem; }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ctrl-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      width: 42px;
      height: 42px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .ctrl-btn:hover { background: var(--surface); border-color: var(--accent); }
    .ctrl-btn.active { border-color: var(--accent2); color: var(--accent2); }
    .ctrl-btn svg { width: 16px; height: 16px; fill: currentColor; }

    .autoplay-toggle {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    .toggle-pill {
      width: 36px;
      height: 20px;
      background: var(--border);
      border-radius: 999px;
      position: relative;
      transition: background 0.2s;
    }
    .toggle-pill.on { background: var(--accent2); }
    .toggle-pill::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      background: white;
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: left 0.2s;
    }
    .toggle-pill.on::after { left: 19px; }

    /* PLAYLIST SIDE */
    .playlist-section {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .playlist-header {
      padding: 28px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .playlist-header h2 {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      padding: 4px 10px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

    .playlist-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .playlist-list::-webkit-scrollbar { width: 4px; }
    .playlist-list::-webkit-scrollbar-track { background: transparent; }
    .playlist-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .playlist-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
      background: var(--surface);
    }
    .playlist-item:hover { background: var(--surface2); border-color: var(--border); }
    .playlist-item.active {
      background: var(--surface2);
      border-color: var(--accent2);
    }
    .item-thumb {
      width: 52px;
      height: 36px;
      border-radius: 4px;
      background: var(--border);
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
    }
    .item-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .item-index {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: white;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .playlist-item:hover .item-index { opacity: 1; }
    .playlist-item.active .item-index { opacity: 1; background: rgba(123,92,245,0.7); }

    .item-info { flex: 1; min-width: 0; }
    .item-title {
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .item-url {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .item-delete svg { width: 14px; height: 14px; fill: currentColor; }
    .playlist-item:hover .item-delete { opacity: 1; }
    .item-delete:hover { color: var(--danger); }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.6;
    }
    .empty-state .big { font-size: 2rem; margin-bottom: 8px; }

    /* Drag indicator (active track) */
    .playing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--accent);
      color: #0a0a0f;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.82rem;
      transition: transform 0.3s ease;
      z-index: 100;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 700px) {
      body { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; }
      .player-section { border-right: none; border-bottom: 1px solid var(--border); }
      .playlist-section { max-height: 340px; }
    }
  </style>
</head>
<body>

<header>
  <h1>MI <span>PLAYLIST</span></h1>
  <span class="track-counter" id="trackCounter">0 canciones</span>
</header>

<!-- PLAYER -->
<section class="player-section">
  <div class="add-form">
    <input type="text" id="urlInput" placeholder="Pega aquí el link de YouTube..." />
    <button onclick="addTrack()">+ Agregar</button>
  </div>

  <div>
    <div class="now-playing-label">Reproduciendo</div>
    <div class="now-playing-title" id="nowPlayingTitle">— Ninguna canción seleccionada —</div>
  </div>

  <div class="video-wrapper" id="videoWrapper">
    <div class="video-placeholder" id="videoPlaceholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z" fill="currentColor"/>
      </svg>
      <p>Agrega un link para empezar</p>
    </div>
    <div id="playerContainer"></div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="playPrev()" title="Anterior">
      <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
    </button>
    <button class="ctrl-btn" onclick="playNext()" title="Siguiente">
      <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
    </button>
    <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Aleatorio">
      <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
    </button>

    <label class="autoplay-toggle" title="Continuar automáticamente">
      <span>Autoplay</span>
      <div class="toggle-pill on" id="autoplayPill"></div>
    </label>
  </div>
</section>

<!-- PLAYLIST -->
<section class="playlist-section">
  <div class="playlist-header">
    <h2>Lista de canciones</h2>
    <button class="clear-btn" onclick="clearAll()">Limpiar todo</button>
  </div>
  <div class="playlist-list" id="playlistList">
    <div class="empty-state">
      <div class="big">🎵</div>
      Aún no hay canciones.<br>Pega un link de YouTube arriba.
    </div>
  </div>
</section>

<div class="toast" id="toast"></div>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>
<script>
  // ─── STATE ────────────────────────────────────────────────
  let playlist = JSON.parse(localStorage.getItem('yt_playlist') || '[]');
  let currentIndex = -1;
  let player = null;
  let playerReady = false;
  let autoplay = true;
  let shuffle = false;

  // ─── YT API ───────────────────────────────────────────────
  function onYouTubeIframeAPIReady() {
    player = new YT.Player('playerContainer', {
      height: '100%',
      width: '100%',
      videoId: '',
      playerVars: { autoplay: 1, rel: 0, modestbranding: 1 },
      events: {
        onReady: () => { playerReady = true; },
        onStateChange: onPlayerStateChange
      }
    });
  }

  function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.ENDED && autoplay) {
      playNext();
    }
  }

  // ─── UTILS ────────────────────────────────────────────────
  function extractVideoId(url) {
    const patterns = [
      /(?:v=|\/embed\/|\/shorts\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/,
      /^([a-zA-Z0-9_-]{11})$/
    ];
    for (const p of patterns) {
      const m = url.match(p);
      if (m) return m[1];
    }
    return null;
  }

  function getThumbnail(videoId) {
    return `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
  }

  function save() {
    localStorage.setItem('yt_playlist', JSON.stringify(playlist));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ─── ADD TRACK ────────────────────────────────────────────
  async function addTrack() {
    const input = document.getElementById('urlInput');
    const url = input.value.trim();
    if (!url) return;

    const videoId = extractVideoId(url);
    if (!videoId) {
      showToast('⚠️ Link inválido, revisa la URL');
      return;
    }

    if (playlist.some(t => t.id === videoId)) {
      showToast('Ya está en la lista');
      input.value = '';
      return;
    }

    // Fetch title via oEmbed
    let title = `Video ${videoId}`;
    try {
      const res = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
      if (res.ok) {
        const data = await res.json();
        title = data.title;
      }
    } catch(e) {}

    playlist.push({ id: videoId, title, url: `https://youtu.be/${videoId}` });
    save();
    input.value = '';
    renderPlaylist();
    showToast('✓ Canción agregada');

    if (currentIndex === -1) playAt(0);
  }

  // ─── PLAY ─────────────────────────────────────────────────
  function playAt(index) {
    if (index < 0 || index >= playlist.length) return;
    currentIndex = index;

    const track = playlist[index];
    document.getElementById('nowPlayingTitle').textContent = track.title;
    document.getElementById('videoPlaceholder').style.display = 'none';

    if (playerReady) {
      player.loadVideoById(track.id);
    }
    renderPlaylist();
  }

  function playNext() {
    if (!playlist.length) return;
    if (shuffle) {
      let next;
      do { next = Math.floor(Math.random() * playlist.length); }
      while (playlist.length > 1 && next === currentIndex);
      playAt(next);
    } else {
      playAt((currentIndex + 1) % playlist.length);
    }
  }

  function playPrev() {
    if (!playlist.length) return;
    playAt((currentIndex - 1 + playlist.length) % playlist.length);
  }

  // ─── CONTROLS ─────────────────────────────────────────────
  function toggleShuffle() {
    shuffle = !shuffle;
    document.getElementById('shuffleBtn').classList.toggle('active', shuffle);
    showToast(shuffle ? '🔀 Aleatorio activado' : '🔀 Aleatorio desactivado');
  }

  document.getElementById('autoplayPill').addEventListener('click', function() {
    autoplay = !autoplay;
    this.classList.toggle('on', autoplay);
    showToast(autoplay ? '▶ Autoplay ON' : '⏸ Autoplay OFF');
  });

  // ─── RENDER ───────────────────────────────────────────────
  function renderPlaylist() {
    const list = document.getElementById('playlistList');
    const counter = document.getElementById('trackCounter');
    counter.textContent = `${playlist.length} canción${playlist.length !== 1 ? 'es' : ''}`;

    if (!playlist.length) {
      list.innerHTML = `<div class="empty-state"><div class="big">🎵</div>Aún no hay canciones.<br>Pega un link de YouTube arriba.</div>`;
      return;
    }

    list.innerHTML = playlist.map((track, i) => `
      <div class="playlist-item ${i === currentIndex ? 'active' : ''}" onclick="playAt(${i})">
        <div class="item-thumb">
          <img src="${getThumbnail(track.id)}" alt="" loading="lazy" />
          <div class="item-index">${i === currentIndex ? '▶' : i + 1}</div>
        </div>
        <div class="item-info">
          <div class="item-title">${escHtml(track.title)}</div>
          <div class="item-url">${escHtml(track.url)}</div>
        </div>
        ${i === currentIndex ? '<div class="playing-dot"></div>' : ''}
        <button class="item-delete" onclick="removeTrack(event, ${i})" title="Eliminar">
          <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        </button>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─── REMOVE / CLEAR ───────────────────────────────────────
  function removeTrack(e, index) {
    e.stopPropagation();
    playlist.splice(index, 1);
    if (currentIndex === index) {
      currentIndex = -1;
      document.getElementById('nowPlayingTitle').textContent = '— Ninguna canción seleccionada —';
      if (playlist.length) playAt(0);
    } else if (currentIndex > index) {
      currentIndex--;
    }
    save();
    renderPlaylist();
  }

  function clearAll() {
    if (!playlist.length) return;
    if (!confirm('¿Borrar toda la lista?')) return;
    playlist = [];
    currentIndex = -1;
    save();
    document.getElementById('nowPlayingTitle').textContent = '— Ninguna canción seleccionada —';
    document.getElementById('videoPlaceholder').style.display = 'flex';
    if (playerReady) player.stopVideo();
    renderPlaylist();
  }

  // ─── KEYBOARD SHORTCUTS ───────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight') playNext();
    if (e.key === 'ArrowLeft') playPrev();
  });

  // ─── ENTER key on input ───────────────────────────────────
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTrack();
  });

  // ─── INIT ─────────────────────────────────────────────────
  renderPlaylist();
  if (playlist.length) playAt(0);
</script>
</body>
</html>
