<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrunoSound</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ════════════════════════════════════════════════════
    // 🔧 REEMPLAZA ESTOS VALORES CON LOS DE TU FIREBASE
    // ════════════════════════════════════════════════════
    const firebaseConfig = {
      apiKey: "AIzaSyAwIFSAqCHjrKDmjkf2-HpHp0gUAYPxxow",
      authDomain: "brunosound-5b2bb.firebaseapp.com",
      projectId: "brunosound-5b2bb",
      storageBucket: "brunosound-5b2bb.firebasestorage.app",
      messagingSenderId: "1060315548629",
      appId: "1:1060315548629:web:809b047a68a21713e84b5c",
      measurementId: "G-0B31H8HZ6W"
    };
    // ════════════════════════════════════════════════════

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window._db = db;
    window._fsLib = { collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy };
    window._firebaseReady = true;
    window.dispatchEvent(new Event('firebaseReady'));
  </script>

  <style>
    :root {
      --bg: #080810;
      --s1: #0f0f1c;
      --s2: #16162a;
      --s3: #1e1e32;
      --accent: #ff6b35;
      --accent2: #ffb347;
      --text: #f0f0f8;
      --muted: #5a5a7a;
      --border: #252540;
      --danger: #ff4466;
      --julian: #ff6b35;
      --alejandra: #ff6fa8;
      --radius: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* LOGIN */
    #loginScreen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 50; background: var(--bg);
    }
    .login-card {
      text-align: center;
      padding: 52px 44px;
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: min(420px, 90vw);
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .login-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.4rem;
      letter-spacing: 0.08em;
      line-height: 1;
      margin-bottom: 6px;
    }
    .login-logo span { color: var(--accent); }
    .login-sub {
      color: var(--muted); font-size: 0.82rem;
      margin-bottom: 36px; letter-spacing: 0.05em;
    }
    .login-label {
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.12em; color: var(--muted);
      text-transform: uppercase; margin-bottom: 14px;
    }
    .user-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .user-btn {
      padding: 22px 16px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: var(--s2);
      cursor: pointer;
      transition: all 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .user-btn:hover { transform: translateY(-3px); }
    .user-btn.julian:hover { border-color: var(--julian); background: rgba(255,107,53,0.08); }
    .user-btn.alejandra:hover { border-color: var(--alejandra); background: rgba(255,111,168,0.08); }
    .user-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 700;
      font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em;
    }
    .julian .user-avatar { background: rgba(255,107,53,0.2); color: var(--julian); }
    .alejandra .user-avatar { background: rgba(255,111,168,0.2); color: var(--alejandra); }
    .user-btn-name { font-weight: 700; font-size: 1rem; color: var(--text); }

    /* APP */
    #app { display: none; min-height: 100vh; flex-direction: column; }
    #app.visible { display: flex; }

    .topbar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(8,8,16,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 58px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .topbar-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.08em; }
    .topbar-logo span { color: var(--accent); }
    .user-badge {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px; border-radius: 999px;
      font-size: 0.82rem; font-weight: 700;
      border: 1px solid var(--border); background: var(--s2);
    }
    .user-badge .dot { width: 8px; height: 8px; border-radius: 50%; }
    .user-badge.julian .dot { background: var(--julian); box-shadow: 0 0 8px var(--julian); }
    .user-badge.alejandra .dot { background: var(--alejandra); box-shadow: 0 0 8px var(--alejandra); }
    .logout-btn {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem; padding: 6px 14px; cursor: pointer; transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    .main-layout {
      flex: 1; display: grid; grid-template-columns: 1fr 360px; gap: 0; min-height: 0;
    }

    /* PLAYER */
    .player-col {
      padding: 28px 32px;
      display: flex; flex-direction: column; gap: 22px;
      border-right: 1px solid var(--border);
    }
    .config-banner {
      background: rgba(255,107,53,0.1);
      border: 1px solid rgba(255,107,53,0.3);
      border-radius: var(--radius);
      padding: 14px 18px; font-size: 0.82rem; line-height: 1.6; color: var(--accent2);
    }
    .config-banner strong { display: block; margin-bottom: 4px; font-size: 0.88rem; }
    .config-banner code {
      background: rgba(0,0,0,0.3); padding: 1px 6px;
      border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 0.78rem;
    }
    .add-section label {
      display: block; font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.14em; color: var(--muted);
      text-transform: uppercase; margin-bottom: 8px;
    }
    .add-form { display: flex; gap: 10px; }
    .add-form input {
      flex: 1; background: var(--s2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px; color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 0.78rem;
      outline: none; transition: border-color 0.2s;
    }
    .add-form input:focus { border-color: var(--accent); }
    .add-form input::placeholder { color: var(--muted); }
    .add-btn {
      background: var(--accent); color: white; border: none;
      border-radius: var(--radius); padding: 12px 22px;
      font-family: 'DM Sans', sans-serif; font-weight: 700;
      font-size: 0.85rem; cursor: pointer; transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
    }
    .add-btn:hover { opacity: 0.85; }
    .add-btn:active { transform: scale(0.97); }
    .add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .np-label {
      font-size: 0.66rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 4px;
    }
    .np-label.julian { color: var(--julian); }
    .np-label.alejandra { color: var(--alejandra); }
    .np-title { font-size: 1.15rem; font-weight: 700; line-height: 1.3; min-height: 1.5em; }

    .video-wrap {
      position: relative; width: 100%; aspect-ratio: 16/9;
      background: var(--s2); border-radius: 14px;
      overflow: hidden; border: 1px solid var(--border);
    }
    .video-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
    .video-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; color: var(--muted);
    }
    .video-placeholder .ico { font-size: 3rem; opacity: 0.3; }
    .video-placeholder p { font-size: 0.82rem; }

    .controls { display: flex; align-items: center; gap: 10px; }
    .ctrl {
      background: var(--s2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      width: 40px; height: 40px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s; flex-shrink: 0;
    }
    .ctrl:hover { background: var(--s3); border-color: var(--accent); }
    .ctrl.on { border-color: var(--accent); color: var(--accent); }
    .ctrl svg { width: 16px; height: 16px; fill: currentColor; }
    .autoplay-row {
      margin-left: auto; display: flex; align-items: center; gap: 8px;
      font-size: 0.78rem; color: var(--muted); cursor: pointer; user-select: none;
    }
    .pill {
      width: 36px; height: 20px; background: var(--border);
      border-radius: 999px; position: relative; transition: background 0.2s;
    }
    .pill.on { background: var(--accent); }
    .pill::after {
      content: ''; position: absolute;
      width: 14px; height: 14px; background: white;
      border-radius: 50%; top: 3px; left: 3px; transition: left 0.2s;
    }
    .pill.on::after { left: 19px; }

    /* PLAYLIST */
    .playlist-col { display: flex; flex-direction: column; overflow: hidden; }
    .pl-header {
      padding: 28px 20px 14px;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .pl-header h2 {
      font-size: 0.66rem; font-weight: 700;
      letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase;
    }
    .pl-count { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); }
    .pl-list {
      flex: 1; overflow-y: auto;
      padding: 0 12px 16px;
      display: flex; flex-direction: column; gap: 5px;
    }
    .pl-list::-webkit-scrollbar { width: 3px; }
    .pl-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .pl-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 8px;
      border: 1px solid transparent; cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      background: var(--s1);
    }
    .pl-item:hover { background: var(--s2); border-color: var(--border); }
    .pl-item.active { background: var(--s2); }
    .pl-item.active.julian { border-color: var(--julian); }
    .pl-item.active.alejandra { border-color: var(--alejandra); }

    .pl-thumb {
      width: 52px; height: 36px; border-radius: 5px;
      background: var(--border); flex-shrink: 0; overflow: hidden; position: relative;
    }
    .pl-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pl-num {
      position: absolute; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace; font-size: 0.6rem; color: white;
      opacity: 0; transition: opacity 0.12s;
    }
    .pl-item:hover .pl-num, .pl-item.active .pl-num { opacity: 1; }
    .pl-info { flex: 1; min-width: 0; }
    .pl-title {
      font-size: 0.8rem; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.35;
    }
    .pl-url {
      font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .playing-bar { display: flex; gap: 2px; align-items: flex-end; height: 14px; flex-shrink: 0; }
    .playing-bar span {
      display: block; width: 3px; background: var(--accent);
      border-radius: 2px; animation: barAnim 0.9s ease-in-out infinite;
    }
    .playing-bar span:nth-child(1) { height: 6px; animation-delay: 0s; }
    .playing-bar span:nth-child(2) { height: 12px; animation-delay: 0.15s; }
    .playing-bar span:nth-child(3) { height: 8px; animation-delay: 0.3s; }
    @keyframes barAnim {
      0%, 100% { transform: scaleY(0.4); }
      50%       { transform: scaleY(1); }
    }
    .pl-item.alejandra .playing-bar span { background: var(--alejandra); }

    .del-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; padding: 4px; border-radius: 4px;
      display: flex; align-items: center;
      opacity: 0; transition: opacity 0.12s, color 0.12s; flex-shrink: 0;
    }
    .del-btn svg { width: 14px; height: 14px; fill: currentColor; }
    .pl-item:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: var(--danger); }

    .empty-pl {
      padding: 40px 16px; text-align: center;
      color: var(--muted); font-size: 0.82rem; line-height: 1.7;
    }
    .empty-pl .ico { font-size: 2rem; display: block; margin-bottom: 8px; }

    .status-bar {
      text-align: center; padding: 6px;
      font-size: 0.72rem; color: var(--muted);
      border-top: 1px solid var(--border);
      font-family: 'DM Mono', monospace; flex-shrink: 0;
    }
    .status-bar.err { color: var(--danger); }

    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(70px);
      padding: 10px 22px;
      background: var(--s3); border: 1px solid var(--border);
      border-radius: 999px; font-size: 0.82rem; font-weight: 500;
      transition: transform 0.3s ease; z-index: 200;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 680px) {
      .main-layout { grid-template-columns: 1fr; }
      .player-col { border-right: none; border-bottom: 1px solid var(--border); padding: 20px 16px; }
      .playlist-col { max-height: 50vh; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">BRUNO<span>SOUND</span></div>
    <div class="login-sub">Tu espacio de música 🎵</div>
    <div class="login-label">¿Quién eres?</div>
    <div class="user-buttons">
      <button class="user-btn julian" onclick="login('julian')">
        <div class="user-avatar">J</div>
        <div class="user-btn-name">Julián</div>
      </button>
      <button class="user-btn alejandra" onclick="login('alejandra')">
        <div class="user-avatar">A</div>
        <div class="user-btn-name">Alejandra</div>
      </button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">BRUNO<span>SOUND</span></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="user-badge" id="userBadge">
        <div class="dot"></div>
        <span id="userBadgeName"></span>
      </div>
      <button class="logout-btn" onclick="logout()">Cambiar usuario</button>
    </div>
  </div>

  <div class="main-layout">
    <div class="player-col">
      <div id="configBanner" class="config-banner" style="display:none;">
        <strong>⚙️ Falta configurar Firebase</strong>
        Las canciones se guardan solo localmente hasta que configures Firebase.
        <a href="#" onclick="showFirebaseGuide();return false;" style="color:var(--accent);text-decoration:underline;margin-left:4px;">Ver pasos →</a>
      </div>

      <div class="add-section">
        <label>Agregar canción de YouTube</label>
        <div class="add-form">
          <input type="text" id="urlInput" placeholder="https://youtu.be/... o youtube.com/watch?v=..." />
          <button class="add-btn" id="addBtn" onclick="addTrack()">+ Agregar</button>
        </div>
      </div>

      <div>
        <div class="np-label" id="npLabel">Reproduciendo</div>
        <div class="np-title" id="npTitle">— Ninguna canción —</div>
      </div>

      <div class="video-wrap" id="videoWrap">
        <div class="video-placeholder" id="videoPlaceholder">
          <div class="ico">🎵</div>
          <p>Agrega un link para empezar</p>
        </div>
        <div id="ytPlayer"></div>
      </div>

      <div class="controls">
        <button class="ctrl" onclick="prevTrack()" title="Anterior">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl" onclick="nextTrack()" title="Siguiente">
          <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button class="ctrl" id="shuffleBtn" onclick="toggleShuffle()" title="Aleatorio">
          <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>
        <label class="autoplay-row">
          <span>Autoplay</span>
          <div class="pill on" id="autoplayPill" onclick="toggleAutoplay()"></div>
        </label>
      </div>
    </div>

    <div class="playlist-col">
      <div class="pl-header">
        <h2>Mi playlist</h2>
        <span class="pl-count" id="plCount">0 canciones</span>
      </div>
      <div class="pl-list" id="plList">
        <div class="empty-pl"><span class="ico">🎶</span>Aún no hay canciones.</div>
      </div>
      <div class="status-bar" id="statusBar">Iniciando...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  let currentUser = sessionStorage.getItem('bs_user') || null;
  let playlist = [];
  let currentIndex = -1;
  let player = null;
  let playerReady = false;
  let autoplay = true;
  let shuffle = false;
  let unsubscribe = null;
  let firebaseOk = false;

  // Wait for Firebase module to load
  function waitForFirebase(cb) {
    if (window._firebaseReady) { cb(); return; }
    window.addEventListener('firebaseReady', cb, { once: true });
  }

  // LOGIN
  function login(user) {
    currentUser = user;
    sessionStorage.setItem('bs_user', user);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    const badge = document.getElementById('userBadge');
    badge.className = `user-badge ${user}`;
    document.getElementById('userBadgeName').textContent = user === 'julian' ? 'Julián' : 'Alejandra';
    document.getElementById('npLabel').className = `np-label ${user}`;
    waitForFirebase(initFirebase);
  }

  function logout() {
    if (unsubscribe) unsubscribe();
    currentUser = null; currentIndex = -1; playlist = [];
    sessionStorage.removeItem('bs_user');
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('app').classList.remove('visible');
    document.getElementById('npTitle').textContent = '— Ninguna canción —';
    document.getElementById('videoPlaceholder').style.display = 'flex';
    if (player && player.stopVideo) player.stopVideo();
    renderPlaylist();
  }

  // FIREBASE INIT
  function initFirebase() {
    // Detect if still using placeholder config
    const scriptText = document.querySelector('script[type="module"]').textContent;
    const isDemo = !window._db || scriptText.includes('"TU_API_KEY"');

    if (isDemo) {
      document.getElementById('configBanner').style.display = 'block';
      document.getElementById('statusBar').textContent = '⚠ Sin Firebase · guardado local';
      loadLocal();
      return;
    }

    firebaseOk = true;
    const { collection, query, orderBy, onSnapshot } = window._fsLib;
    const q = query(
      collection(window._db, `playlists/${currentUser}/tracks`),
      orderBy('addedAt', 'asc')
    );
    unsubscribe = onSnapshot(q,
      (snap) => {
        const prevLen = playlist.length;
        playlist = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
        setStatus(`● Sincronizado · ${playlist.length} canción${playlist.length !== 1 ? 'es' : ''}`);
        renderPlaylist();
        if (prevLen === 0 && playlist.length > 0) playAt(0);
      },
      (err) => {
        console.error(err);
        setStatus('⚠ Error de conexión', true);
      }
    );
  }

  function loadLocal() {
    playlist = JSON.parse(localStorage.getItem(`bs_${currentUser}`) || '[]');
    setStatus(`Local · ${playlist.length} canción${playlist.length !== 1 ? 'es' : ''}`);
    renderPlaylist();
    if (playlist.length) playAt(0);
  }

  function saveLocal() {
    localStorage.setItem(`bs_${currentUser}`, JSON.stringify(playlist));
    setStatus(`Local · ${playlist.length} canción${playlist.length !== 1 ? 'es' : ''}`);
  }

  function setStatus(msg, err = false) {
    const el = document.getElementById('statusBar');
    el.textContent = msg;
    el.className = 'status-bar' + (err ? ' err' : '');
  }

  // UTILS
  function extractId(url) {
    const m = url.match(/(?:v=|\/embed\/|\/shorts\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }
  function thumb(id) { return `https://img.youtube.com/vi/${id}/mqdefault.jpg`; }
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ADD TRACK
  async function addTrack() {
    const input = document.getElementById('urlInput');
    const url = input.value.trim();
    if (!url) return;
    const videoId = extractId(url);
    if (!videoId) { toast('⚠ Link inválido'); return; }
    if (playlist.some(t => t.id === videoId)) { toast('Ya está en la lista'); input.value = ''; return; }

    const btn = document.getElementById('addBtn');
    btn.disabled = true; btn.textContent = '...';

    let title = `Video ${videoId}`;
    try {
      const r = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
      if (r.ok) title = (await r.json()).title;
    } catch(e) {}

    const track = { id: videoId, title, url: `https://youtu.be/${videoId}`, addedAt: Date.now() };

    if (firebaseOk) {
      const { doc, setDoc, collection } = window._fsLib;
      await setDoc(doc(window._db, `playlists/${currentUser}/tracks`, videoId), track);
    } else {
      playlist.push(track);
      saveLocal();
      renderPlaylist();
      if (playlist.length === 1) playAt(0);
    }

    input.value = ''; btn.disabled = false; btn.textContent = '+ Agregar';
    toast('✓ Canción agregada');
  }

  // REMOVE
  async function removeTrack(e, videoId) {
    e.stopPropagation();
    if (firebaseOk) {
      const { doc, deleteDoc } = window._fsLib;
      await deleteDoc(doc(window._db, `playlists/${currentUser}/tracks`, videoId));
    } else {
      const idx = playlist.findIndex(t => t.id === videoId);
      if (idx !== -1) {
        if (currentIndex === idx) currentIndex = -1;
        else if (currentIndex > idx) currentIndex--;
        playlist.splice(idx, 1);
        saveLocal();
        renderPlaylist();
      }
    }
    toast('Eliminada');
  }

  // PLAYBACK
  function playAt(index) {
    if (index < 0 || index >= playlist.length) return;
    currentIndex = index;
    document.getElementById('npTitle').textContent = playlist[index].title;
    document.getElementById('videoPlaceholder').style.display = 'none';
    if (playerReady) player.loadVideoById(playlist[index].id);
    renderPlaylist();
  }

  function nextTrack() {
    if (!playlist.length) return;
    if (shuffle) {
      let n; do { n = Math.floor(Math.random() * playlist.length); }
      while (playlist.length > 1 && n === currentIndex);
      playAt(n);
    } else { playAt((currentIndex + 1) % playlist.length); }
  }

  function prevTrack() {
    if (!playlist.length) return;
    playAt((currentIndex - 1 + playlist.length) % playlist.length);
  }

  function toggleShuffle() {
    shuffle = !shuffle;
    document.getElementById('shuffleBtn').classList.toggle('on', shuffle);
    toast(shuffle ? '🔀 Aleatorio ON' : '🔀 Aleatorio OFF');
  }

  function toggleAutoplay() {
    autoplay = !autoplay;
    document.getElementById('autoplayPill').classList.toggle('on', autoplay);
  }

  // YOUTUBE API
  function onYouTubeIframeAPIReady() {
    player = new YT.Player('ytPlayer', {
      height: '100%', width: '100%', videoId: '',
      playerVars: { autoplay: 1, rel: 0, modestbranding: 1 },
      events: {
        onReady: () => {
          playerReady = true;
          if (currentIndex >= 0 && playlist[currentIndex]) player.loadVideoById(playlist[currentIndex].id);
        },
        onStateChange: (e) => { if (e.data === YT.PlayerState.ENDED && autoplay) nextTrack(); }
      }
    });
  }

  // RENDER
  function renderPlaylist() {
    const list = document.getElementById('plList');
    document.getElementById('plCount').textContent = `${playlist.length} canción${playlist.length !== 1 ? 'es' : ''}`;
    if (!playlist.length) {
      list.innerHTML = `<div class="empty-pl"><span class="ico">🎶</span>Aún no hay canciones.<br>Pega un link arriba.</div>`;
      return;
    }
    list.innerHTML = playlist.map((t, i) => `
      <div class="pl-item ${i === currentIndex ? 'active' : ''} ${currentUser}" onclick="playAt(${i})">
        <div class="pl-thumb">
          <img src="${thumb(t.id)}" alt="" loading="lazy" />
          <div class="pl-num">${i === currentIndex ? '▶' : i + 1}</div>
        </div>
        <div class="pl-info">
          <div class="pl-title">${esc(t.title)}</div>
          <div class="pl-url">youtu.be/${esc(t.id)}</div>
        </div>
        ${i === currentIndex ? `<div class="playing-bar"><span></span><span></span><span></span></div>` : ''}
        <button class="del-btn" onclick="removeTrack(event,'${t.id}')" title="Eliminar">
          <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        </button>
      </div>`).join('');
  }

  // FIREBASE GUIDE
  function showFirebaseGuide() {
    alert(`Pasos para configurar Firebase (gratis):

1. Ve a https://console.firebase.google.com
2. Crea un proyecto nuevo → nombre "brunosound"
3. Agrega una app Web (ícono </>)
4. Copia los valores del objeto firebaseConfig
5. Abre este index.html en un editor de texto
6. Busca "TU_API_KEY" y reemplaza los 6 valores
7. En Firebase → Firestore Database → Crear → Modo prueba
8. Sube el archivo actualizado a GitHub/Vercel

¡Listo! Las playlists de Julián y Alejandra
se guardarán por separado en la nube.`);
  }

  // KEYBOARD
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight') nextTrack();
    if (e.key === 'ArrowLeft') prevTrack();
  });
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTrack();
  });

  // AUTO-LOGIN if session exists
  if (currentUser) login(currentUser);
</script>
</body>
</html>
